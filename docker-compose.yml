services:
  backend:
    build:
      context: ./backend/price_tracker
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./data:/root/data
    env_file:
      - ./backend/price_tracker/.env
    environment:
      DB_PATH: /root/data/tracker.db

  frontend:
    build: 
      context: ./frontend/price-tracker
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend